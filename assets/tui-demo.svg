<svg xmlns="http://www.w3.org/2000/svg" width="820" height="460" viewBox="0 0 820 460" font-family="'SFMono-Regular','Menlo','Monaco','Consolas','Liberation Mono','Courier New',monospace" font-size="13">
  <defs>
    <style>
      .bg { fill: #1e1e2e; }
      .titlebar { fill: #313244; }
      .text { fill: #cdd6f4; }
      .dim { fill: #6c7086; }
      .cyan { fill: #89dceb; }
      .blue { fill: #89b4fa; }
      .green { fill: #a6e3a1; }
      .bold { font-weight: bold; }
      .border { fill: none; stroke: #6c7086; stroke-width: 1; }
      .border-blue { fill: none; stroke: #89b4fa; stroke-width: 1; }
      .border-green { fill: none; stroke: #a6e3a1; stroke-width: 1; }
      .border-gray { fill: none; stroke: #6c7086; stroke-width: 1; }
    </style>
  </defs>

  <!-- Terminal window background -->
  <rect class="bg" width="820" height="460" rx="8"/>

  <!-- Title bar -->
  <rect class="titlebar" width="820" height="32" rx="8"/>
  <rect class="titlebar" y="24" width="820" height="8"/>
  <circle cx="20" cy="16" r="6" fill="#f38ba8"/>
  <circle cx="40" cy="16" r="6" fill="#f9e2af"/>
  <circle cx="60" cy="16" r="6" fill="#a6e3a1"/>
  <text x="410" y="20" text-anchor="middle" class="dim" font-size="12">agentcoop</text>

  <!-- Agent A pane (left) -->
  <rect x="12" y="44" width="393" height="270" class="border-blue" rx="2"/>
  <text x="22" y="62" class="blue bold">Agent A (implementer) &#x2014; claude-sonnet</text>

  <text x="22" y="92" class="text">I'll start by reading the issue and</text>
  <text x="22" y="110" class="text">exploring the repository structure.</text>

  <text x="22" y="150" class="dim">&#x254C;&#x254C;&#x254C;&#x254C;&#x254C;&#x254C;&#x254C;&#x254C;&#x254C; Prompt &#x254C;&#x254C;&#x254C;&#x254C;&#x254C;&#x254C;&#x254C;&#x254C;&#x254C;</text>
  <text x="22" y="168" class="dim">&#x25B6; Implement the following GitHub</text>
  <text x="22" y="186" class="dim">&#x25B6; issue in a new git branch&#x2026;</text>
  <text x="22" y="204" class="dim">&#x254C;&#x254C;&#x254C;&#x254C;&#x254C;&#x254C;&#x254C;&#x254C;&#x254C;&#x254C;&#x254C;&#x254C;&#x254C;&#x254C;&#x254C;&#x254C;&#x254C;&#x254C;&#x254C;&#x254C;&#x254C;&#x254C;&#x254C;&#x254C;&#x254C;</text>

  <text x="22" y="234" class="text">Let me check the existing code to</text>
  <text x="22" y="252" class="text">understand the project structure.</text>

  <!-- Agent B pane (right) -->
  <rect x="415" y="44" width="393" height="270" class="border-green" rx="2"/>
  <text x="425" y="62" class="green bold">Agent B (reviewer) &#x2014; claude-sonnet</text>

  <text x="425" y="92" class="dim">(waiting for output)</text>

  <!-- Status bar -->
  <rect x="12" y="322" width="796" height="30" class="border-gray" rx="2"/>
  <text x="22" y="342" class="cyan bold">owner/repo#42</text>
  <text x="135" y="342" class="text">  |  </text>
  <text x="162" y="342" class="text bold">Stage 2: Implement</text>
  <text x="310" y="342" class="text">  |  </text>
  <text x="337" y="342" class="text">Round: 1 (in progress)</text>

  <!-- Input area -->
  <rect x="12" y="360" width="796" height="30" rx="2" fill="none"/>
  <text x="22" y="382" class="dim">Pipeline running...</text>

  <!-- Keyboard hint -->
  <text x="22" y="420" class="dim" font-size="11">Tab: switch pane focus | PageUp/PageDown: scroll | &#x2191;/&#x2193;: scroll line</text>
</svg>
