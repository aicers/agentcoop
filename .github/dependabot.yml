version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    labels:
      - dependencies
    groups:
      tooling:
        patterns:
          - "@biomejs/biome"
          - vitest
    ignore:
      - dependency-name: node
        update-types:
          - version-update:semver-major
        versions:
          - ">= 26"
      - dependency-name: "@types/node"
        update-types:
          - version-update:semver-major
        versions:
          - ">= 25"
      - dependency-name: typescript
        update-types:
          - version-update:semver-major
        versions:
          - ">= 6"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels:
      - dependencies
